<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - TravelBuddy</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
    <div th:replace="fragments/header :: site-header"></div>

    <main class="error-page">
        <div class="error-card">
            <h1>Something went wrong</h1>
            <p th:text="${message}">An unexpected error occurred.</p>
            <p class="error-path" th:if="${path != null}">
                Path: <span th:text="${path}">/</span>
            </p>
            <a class="btn-solid" th:href="@{/}">Return Home</a>
        </div>
    </main>

    <div th:replace="fragments/footer :: site-footer"></div>
</body>
</html>
