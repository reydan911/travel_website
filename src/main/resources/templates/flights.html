<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights - TravelBuddy</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="fragments/header :: user-header"></div>

<div class="container py-5">
    <h1 class="mb-4">Available Flights</h1>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <!-- Search form -->
    <form class="row g-3 mb-4" th:action="@{/search-flights}" method="get">
        <div class="col-md-3">
            <label class="form-label">Origin</label>
            <input type="text" class="form-control" name="origin" placeholder="e.g. Kuala Lumpur" th:value="${origin}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Destination</label>
            <input type="text" class="form-control" name="destination" placeholder="e.g. Tokyo" th:value="${destination}">
        </div>
        <div class="col-md-2">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" name="date" th:value="${date}">
        </div>
        <div class="col-md-2">
            <label class="form-label">Max Price (RM)</label>
            <input type="number" class="form-control" name="maxPrice" min="0" step="0.01" th:value="${maxPrice}">
        </div>
        <div class="col-md-2">
            <label class="form-label">Sort</label>
            <select class="form-select" name="sort">
                <option value="" th:selected="${sort == null or sort == ''}">Default</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Price: Low to High</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Price: High to Low</option>
            </select>
        </div>
        <div class="col-md-12 d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Search Flights</button>
        </div>
    </form>

    <table class="table table-striped table-hover" th:if="${flights != null}">
        <thead>
        <tr>
            <th>Airline</th>
            <th>Flight #</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Departure</th>
            <th>Arrival</th>
            <th>Price (RM)</th>
            <th>Seats Left</th>
            <th>Cabin</th>
            <th>Book</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${flights}">
            <td th:text="${f.airline}">Airline</td>
            <td th:text="${f.flightNumber}">FN123</td>
            <td th:text="${f.origin}">KUL</td>
            <td th:text="${f.destination}">TYO</td>
            <td th:text="${#temporals.format(f.departureTime, 'dd/MM/yyyy HH:mm')}">Dep</td>
            <td th:text="${#temporals.format(f.arrivalTime, 'dd/MM/yyyy HH:mm')}">Arr</td>
            <td th:text="${f.price}">999.00</td>
            <td th:text="${f.availableSeats != null ? f.availableSeats : 0}">0</td>
            <td>
                <span class="badge text-bg-secondary" th:text="${f.cabinClass != null ? f.cabinClass : 'Standard'}">Standard</span>
            </td>
            <td>
                <form th:action="@{/bookings/add}" method="post" class="d-flex flex-column gap-2">
                    <input type="hidden" name="flightId" th:value="${f.id}">
                    <input type="number" name="pax" class="form-control form-control-sm" min="1"
                           th:attr="max=${f.availableSeats != null ? f.availableSeats : 1}" value="1" aria-label="Passengers">
                    <details class="flight-addons" th:if="${flightAddOns != null and !#lists.isEmpty(flightAddOns)}">
                        <summary>Add-ons</summary>
                        <div class="flight-addons-list">
                            <label class="flight-addon-item"
                                   th:each="addOn : ${flightAddOns}"
                                   th:classappend="${#strings.equalsIgnoreCase(addOn.name, 'Premium Meal') and (f.cabinClass == null or !#strings.containsIgnoreCase(f.cabinClass, 'economy'))} ? 'text-muted' : ''">
                                <input type="checkbox" name="addOnIds" th:value="${addOn.id}"
                                       th:disabled="${#strings.equalsIgnoreCase(addOn.name, 'Premium Meal') and (f.cabinClass == null or !#strings.containsIgnoreCase(f.cabinClass, 'economy'))}">
                                <span th:text="${addOn.name}">Add-on</span>
                                <span class="text-muted">- RM <span th:text="${addOn.price}">0</span></span>
                                <small class="text-muted"
                                       th:if="${#strings.equalsIgnoreCase(addOn.name, 'Premium Meal') and (f.cabinClass == null or !#strings.containsIgnoreCase(f.cabinClass, 'economy'))}">
                                    (Economy only)
                                </small>
                            </label>
                        </div>
                    </details>
                    <button type="submit" class="btn btn-sm btn-success"
                            th:disabled="${f.availableSeats != null and f.availableSeats == 0}">Book</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${flights == null or #lists.isEmpty(flights)}">
        No flights found.
    </p>

    <nav th:if="${totalPages != null and totalPages > 1}" aria-label="Flight pages">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/search-flights(page=${currentPage - 1}, size=${pageSize}, origin=${origin}, destination=${destination}, date=${date}, maxPrice=${maxPrice}, sort=${sort})}">
                    Previous
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/search-flights(page=${i}, size=${pageSize}, origin=${origin}, destination=${destination}, date=${date}, maxPrice=${maxPrice}, sort=${sort})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/search-flights(page=${currentPage + 1}, size=${pageSize}, origin=${origin}, destination=${destination}, date=${date}, maxPrice=${maxPrice}, sort=${sort})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>

    <a class="btn btn-outline-secondary mt-3" th:href="@{/}">Back to Home</a>
</div>

<div th:replace="fragments/footer :: site-footer"></div>
</body>
</html>
