<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask AI - TravelBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div th:replace="fragments/header :: user-header"></div>

<div class="dashboard-container">
    <section class="recent-section">
        <h3>Ask TravelBuddy AI</h3>
        <p class="text-muted">Get quick suggestions for destinations, itineraries, and travel tips.</p>

        <form method="post" th:action="@{/chat}">
            <div class="actions-grid">
                <div class="action-card">
                    <label for="message">Your question</label>
                    <input id="message" type="text" name="message" placeholder="Ask about destinations" class="form-control">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn-solid">Ask</button>
            </div>
        </form>

        <div th:if="${reply}" class="recent-section mt-4">
            <h4>AI Says</h4>
            <p th:text="${reply}"></p>
        </div>
    </section>
</div>

<div th:replace="fragments/footer :: site-footer"></div>
</body>
</html>
