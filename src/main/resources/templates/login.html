<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>TravelBuddy - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div th:replace="fragments/header :: site-header"></div>

<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h3 class="mb-3">Login</h3>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${param.registered}" class="alert alert-success">Registration successful! You can now login.</div>

      <form method="post" th:action="@{/login}">
        <input type="hidden" name="next" th:value="${next}">
        <div class="mb-2">
          <label class="form-label">Email or Username</label>
          <input name="identifier" type="text" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" required>
        </div>
        <button class="btn-solid w-100 mb-2">Login</button>
      </form>
    </div>
  </div>

  <footer class="text-center mt-5 mb-3 text-muted">
    University Project - TravelBuddy 2025
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
